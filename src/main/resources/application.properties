spring.application.name=server-assistant
server.port=8008

# Import modular config files
spring.config.import=classpath:config/command.properties,\
  classpath:config/security.properties,\
  classpath:config/ai.properties,\
  classpath:config/system.properties,\
  optional:file:./.local/config.properties,\
  optional:file:./.local/secrets.properties

# Groq primary API key (single key for Spring AI default client)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai

# PostgreSQL Database
# Set DATABASE_URL to override, e.g. jdbc:postgresql://host:5432/dbname
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/serverassistant}
spring.datasource.username=serverassistant
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway manages schema; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
# Keep saveAll() efficient when persisting multiple messages in one call.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Flyway (schema migration)
spring.flyway.enabled=true

# Session timeout
server.servlet.session.timeout=8h

# UserContext store backend: memory (default) or redis
app.user-context.store=memory
app.user-context.ttl-ms=300000
app.user-context.hard-ttl-ms=3600000
app.user-context.cleanup-interval-minutes=5
app.user-context.redis.namespace=server-assistant:user-context
