# AI stream retry
app.ai.retry.max-empty-retries=1
app.ai.retry.max-http-retries=3
app.ai.retry.http-initial-backoff-seconds=2
app.ai.retry.temperature-base=0.2
app.ai.retry.temperature-on-empty-retry=0.3
app.ai.key-cooldown-ms=90000

# Optional extra Groq API keys for round-robin rotation (comma-separated)
app.ai.groq-api-keys=${GROQ_API_KEYS:}

# Available AI models
app.ai.default-model-key=20b
app.ai.default-model-name=openai/gpt-oss-20b

app.ai.models.120b.name=openai/gpt-oss-120b
app.ai.models.120b.tpm=8000
app.ai.models.120b.label=GPT OSS 120B
app.ai.models.120b.category=High Intelligence

app.ai.models.20b.name=openai/gpt-oss-20b
app.ai.models.20b.tpm=8000
app.ai.models.20b.label=GPT OSS 20B
app.ai.models.20b.category=High Intelligence

# Chat memory
app.chat.memory.max-messages-per-conversation=300
