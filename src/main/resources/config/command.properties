# Background command jobs
app.command.jobs.max-parallel=8
app.command.jobs.queue-capacity=80

# Output capture thread pool
app.command.capture.max-parallel=32
app.command.capture.queue-capacity=128
app.command.capture.keep-alive-seconds=60

# Pending confirmation cleanup
app.command.pending-confirmation.ttl-ms=600000
app.command.pending-confirmation.cleanup-interval-ms=60000

# Retention cleanup (command_logs + chat_messages)
app.command.audit-log.retention-days=90
app.command.audit-log.cleanup-interval-ms=86400000

# Output size limits
app.command.output.max-chars-ai=2000
app.command.output.max-chars-deterministic=8000

# Per-command execution timeouts (seconds)
app.command.timeout.default=10
app.command.timeout.du=30
app.command.timeout.find=60
app.command.timeout.archive=300
app.command.timeout.package-install=600
app.command.timeout.apt=600
app.command.timeout.long-running=1800
