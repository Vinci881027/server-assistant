# CORS whitelist (comma-separated). Empty falls back to http://localhost:5173 in SecurityConfig.
# StartupEnvironmentValidator requires app.security.cors.allowed-origins when datasource is PostgreSQL
# and APP_ENV/DEPLOY_ENV is not local/dev/development/test.
app.security.cors.allowed-origins=
# StartupEnvironmentValidator also requires SESSION_SIGNATURE_SECRET under the same conditions.
app.security.session.signature-secret=${SESSION_SIGNATURE_SECRET:}

# Chat request-rate limiting (per-user, sliding window).
# Acts as a coarse fallback guard; primary per-user shaping is handled by user TPM limiter.
app.security.chat.max-requests-per-window=500
app.security.chat.window-minutes=5
app.security.chat.max-tracked-users=500
app.security.chat.cleanup-interval-ms=60000
app.security.chat.global-concurrent-ai-streams=20
# Assumption used as the upper-bound divisor for dynamic per-user TPM budgeting.
# Effective divisor = min(active users in current TPM window, concurrent-users-capacity-assumption).
# So one active user can use full TPM; more active users share budget until reaching this cap.
app.security.chat.user-tpm-concurrent-users-capacity-assumption=10
app.security.chat.user-tpm-window-minutes=1
app.security.chat.user-tpm-max-tracked-users=500
app.security.chat.user-tpm-cleanup-interval-ms=60000

# Deterministic slash/exclamation command rate limiting (per-user, sliding window)
app.security.slash.max-requests-per-window=50
app.security.slash.window-minutes=1
app.security.slash.max-tracked-users=500
app.security.slash.cleanup-interval-ms=60000

# File operation rate limiting (per-user, fixed window)
app.security.file.max-requests-per-window=20
app.security.file.window-minutes=1
app.security.file.max-tracked-users=500
app.security.file.cleanup-interval-ms=60000

# Login brute-force protection
app.security.login.max-failed-attempts-per-ip=10
app.security.login.max-failed-attempts-per-user=8
app.security.login.max-tracked-ips=2000
app.security.login.max-tracked-users=200
app.security.login.failure-window-minutes=10
app.security.login.lock-minutes=15
app.security.login.cleanup-interval-ms=60000
app.security.login.trust-forward-headers=false
# Comma-separated proxy IP whitelist used to trust X-Forwarded-For/X-Real-IP.
app.security.login.trusted-proxy-ips=
