# Use H2 in-memory for tests; Flyway is disabled so Hibernate creates the schema.
spring.config.import=classpath:config/command.properties,\
  classpath:config/security.properties,\
  classpath:config/ai.properties,\
  classpath:config/system.properties

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

# Provide a dummy API key so Spring AI OpenAI autoconfig can initialize during tests.
spring.ai.openai.api-key=dummy

# Explicit environment marker required by StartupEnvironmentValidator.
APP_ENV=test
